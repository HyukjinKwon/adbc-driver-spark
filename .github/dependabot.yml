# Keep dependencies and CI actions up to date. Grouped, weekly PRs to keep noise
# low. The Spark Connect protos and the Spark version matrix are pinned
# deliberately (see PROTO_VERSION and the e2e workflow) and are not managed here.
version: 2
updates:
  # GitHub Actions used by ci.yml / e2e.yml / release.yml / docs.yml.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
    labels: ["dependencies", "ci"]
    commit-message:
      prefix: "ci"

  # Go module (root): arrow-adbc, arrow-go, grpc, protobuf, etc.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    groups:
      go-dependencies:
        patterns: ["*"]
    labels: ["dependencies", "go"]
    commit-message:
      prefix: "go"
    # Arrow + ADBC versions are coupled and bumped intentionally together; allow
    # updates but keep them grouped so they are reviewed as a set.
    open-pull-requests-limit: 5

  # Python package (adbc-driver-spark).
  - package-ecosystem: pip
    directory: "/python"
    schedule:
      interval: weekly
    groups:
      python-dependencies:
        patterns: ["*"]
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "python"

  # Base image for the local Spark Connect test harness.
  - package-ecosystem: docker
    directory: "/tests/docker"
    schedule:
      interval: weekly
    labels: ["dependencies", "docker"]
    commit-message:
      prefix: "docker"
