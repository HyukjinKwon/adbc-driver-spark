site_name: ADBC Driver for Spark Connect
site_description: An Apache Arrow ADBC driver for Apache Spark Connect. Arrow-native, multi-language, production grade.
site_url: https://hyukjinkwon.github.io/adbc-driver-spark/
repo_url: https://github.com/HyukjinKwon/adbc-driver-spark
repo_name: HyukjinKwon/adbc-driver-spark
edit_uri: edit/main/docs/

theme:
  name: material
  icon:
    logo: material/database-arrow-right
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
    - search.suggest
    - search.share
  font:
    text: Inter
    code: JetBrains Mono
  # Arrow-aligned blue palette with a light/dark toggle. The exact brand colors
  # are defined as CSS custom properties in stylesheets/extra.css.
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/HyukjinKwon/adbc-driver-spark
      name: Source on GitHub
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/adbc-driver-spark/
      name: adbc-driver-spark on PyPI

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true

# Grouped into a few top-level sections so the navigation tabs stay tidy.
nav:
  - Home: index.md
  - Get started:
      - Installation: installation.md
      - Quickstart: quickstart.md
      - Connecting and Authentication: connecting.md
  - Guides:
      - Querying Data: querying.md
      - Python DBAPI: python-dbapi.md
      - Ecosystem Integrations: integrations.md
      - Metadata and Catalogs: metadata.md
      - Type Mapping: type-mapping.md
      - Configuration Reference: configuration.md
  - Languages:
      - Using from Python: usage-python.md
      - Using from C and C++: usage-c.md
      - Using from Go: usage-go.md
      - Using from R: usage-r.md
  - Reference:
      - Examples: examples.md
      - Compatibility and Conformance: compatibility.md
      - Architecture: architecture.md
      - Troubleshooting: troubleshooting.md
      - Contributing: contributing.md
