#
# A one-command Spark Connect server for local development and e2e tests:
#
#   docker compose -f tests/docker/docker-compose.yml up --build -d
#   # connect with: sc://localhost:15002
#   docker compose -f tests/docker/docker-compose.yml down
#
# Override the Spark version:  SPARK_VERSION=4.0.0 docker compose ... up
services:
  spark-connect:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SPARK_VERSION: ${SPARK_VERSION:-4.1.2}
        SCALA_VERSION: ${SCALA_VERSION:-2.13}
    image: adbc-driver-spark/spark-connect:${SPARK_VERSION:-4.1.2}
    container_name: adbc-spark-connect
    ports:
      - "15002:15002"
    environment:
      SPARK_CONNECT_PORT: "15002"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/15002'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 90s
