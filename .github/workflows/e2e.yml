# End-to-end tests against a live Spark Connect server.
#
# We test compatibility against BOTH the current target (Spark 4.1.x) and the
# previous line (Spark 4.0.x) on every run, mirroring the live-Spark matrix used
# by the reference clients spark-connect-ruby and spark-connect-scala3.
#
# Each matrix entry downloads the official Spark distribution from the Apache
# archive and starts its bundled Spark Connect server. Spark 4.0.0+ ships only a
# Scala 2.13 build and bundles spark-connect, so no extra --packages are needed.
# The docker-based server under tests/docker/ remains available for local
# development and is parameterised by the same SPARK_VERSION.

name: E2E

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "driver/**"
      - "internal/**"
      - "c/**"
      - "python/**"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:
  schedule:
    # Nightly at 04:17 UTC.
    - cron: "17 4 * * *"

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.x"
  PYTHON_VERSION: "3.11"
  SPARK_CONNECT_URI: sc://localhost:15002
  SPARK_REMOTE: sc://localhost:15002

jobs:
  e2e:
    name: Spark ${{ matrix.spark }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # The archive tarballs do not put the Connect server on
        # start-connect-server.sh's launch classpath (even for 4.x), so we add
        # the matching spark-connect_2.13 package on every version. This is the
        # method documented by Spark for starting a standalone Connect server.
        # Spark 4.x is Scala 2.13 by default; for 3.5.x we use the Scala 2.13
        # tarball so the _2.13 package resolves against a 2.13 runtime.
        include:
          - spark: "4.1.0"
            dist: spark-4.1.0-bin-hadoop3
            packages: "--packages org.apache.spark:spark-connect_2.13:4.1.0"
          - spark: "4.0.0"
            dist: spark-4.0.0-bin-hadoop3
            packages: "--packages org.apache.spark:spark-connect_2.13:4.0.0"
          - spark: "3.5.0"
            dist: spark-3.5.0-bin-hadoop3-scala2.13
            packages: "--packages org.apache.spark:spark-connect_2.13:3.5.0"
    env:
      SPARK_VERSION: ${{ matrix.spark }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Spark distribution
        id: spark-cache
        uses: actions/cache@v4
        with:
          path: ~/spark
          key: ${{ matrix.dist }}

      - name: Download Spark ${{ matrix.spark }}
        if: steps.spark-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/spark
          curl -fsSL "https://archive.apache.org/dist/spark/spark-${{ matrix.spark }}/${{ matrix.dist }}.tgz" \
            | tar xz -C ~/spark --strip-components=1

      - name: Start Spark Connect server
        run: |
          # Do NOT set SPARK_NO_DAEMONIZE: spark-daemon.sh treats any non-empty
          # value as "run in the foreground", which hangs this step forever.
          # Leaving it unset lets the server daemonize so the wait loop runs.
          ~/spark/sbin/start-connect-server.sh \
            ${{ matrix.packages }} \
            --conf spark.log.level=WARN
          # Wait for the gRPC port to accept connections.
          for i in $(seq 1 60); do
            if bash -c "</dev/tcp/localhost/15002" 2>/dev/null; then echo "Spark Connect up"; break; fi
            sleep 2
          done

      - name: Go e2e suite
        run: go test -tags e2e -v -timeout 20m ./tests/e2e/...

      - name: Build shared library and install Python package
        env:
          CGO_ENABLED: "1"
        run: |
          go build -tags driverlib -buildmode=c-shared \
            -o python/adbc_driver_spark/libadbc_driver_spark.so ./c
          python -m pip install --upgrade pip
          pip install -r tests/e2e/requirements.txt
          pip install ./python

      - name: Python e2e suite
        run: |
          pytest -v tests/e2e/
          # Package-level DBAPI integration tests (honor SPARK_CONNECT_URI, set
          # above; self-skip when unset). Requested by M3 for extra coverage.
          pytest -v python/tests/test_integration.py

      - name: Validate Python ecosystem examples
        # Every runnable example under examples/python/ is executed against the
        # live Spark Connect server so the documented pandas, polars, DuckDB, and
        # pyarrow integrations cannot silently rot. The auth/TLS example needs
        # real credentials, so it is skipped here.
        run: |
          pip install polars duckdb "pandas>=2.0"
          rc=0
          for f in examples/python/[0-9]*.py; do
            case "$f" in
              *06_auth_tls.py) echo "skip $f (needs credentials)"; continue ;;
            esac
            echo "::group::run $f"
            if ! python "$f"; then
              echo "::error file=$f::example failed"
              rc=1
            fi
            echo "::endgroup::"
          done
          exit $rc

      - name: Dump Spark logs on failure
        if: failure()
        run: tail -n 300 ~/spark/logs/*.out 2>/dev/null || true
