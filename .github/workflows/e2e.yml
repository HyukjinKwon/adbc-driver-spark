# End-to-end tests against a live Spark Connect server.
#
# We test compatibility against BOTH the current target (Spark 4.1.x) and the
# previous line (Spark 4.0.x) on every run, mirroring the live-Spark matrix used
# by the reference clients spark-connect-ruby and spark-connect-scala3.
#
# Each matrix entry downloads the official Spark distribution from the Apache
# archive and starts its bundled Spark Connect server. Spark 4.0.0+ ships only a
# Scala 2.13 build and bundles spark-connect, so no extra --packages are needed.
# The docker-based server under tests/docker/ remains available for local
# development and is parameterised by the same SPARK_VERSION.

name: E2E

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "driver/**"
      - "internal/**"
      - "c/**"
      - "python/**"
      - "tests/e2e/**"
      - ".github/workflows/e2e.yml"
  workflow_dispatch:
  schedule:
    # Nightly at 04:17 UTC.
    - cron: "17 4 * * *"

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.25.x"
  PYTHON_VERSION: "3.11"
  # NOTE: SPARK_CONNECT_URI / SPARK_REMOTE are intentionally NOT set here. If
  # SPARK_REMOTE is present in the environment, start-connect-server.sh launches
  # spark-submit in Connect *client* mode and cannot find the server class
  # ("Failed to load class ... SparkConnectServer"). These vars are set only on
  # the test steps that talk to the already-running server.

jobs:
  e2e:
    name: Spark ${{ matrix.spark }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        # Mirrors the spark-connect-ruby CI. Spark 4.x ships a Scala 2.13 build
        # whose default tarball bundles the Connect server, so no --packages is
        # needed. Spark 3.5.x defaults to a Scala 2.12 build that does NOT bundle
        # Connect, so we use the Scala 2.13 tarball and add the matching package.
        # Latest patch of each supported line.
        include:
          # The C and R examples are exercised once (on the current target line)
          # to keep CI fast while still proving the multi-language support.
          - spark: "4.1.2"
            dist: spark-4.1.2-bin-hadoop3
            packages: ""
            cr: "true"
          - spark: "4.0.3"
            dist: spark-4.0.3-bin-hadoop3
            packages: ""
          - spark: "3.5.8"
            dist: spark-3.5.8-bin-hadoop3-scala2.13
            packages: "--packages org.apache.spark:spark-connect_2.13:3.5.8"
    env:
      SPARK_VERSION: ${{ matrix.spark }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Spark distribution
        id: spark-cache
        uses: actions/cache@v6
        with:
          path: ~/spark
          # The -v2 suffix busts any cache entry that held a truncated
          # extraction (a piped `curl | tar` can cache a partial jars/).
          key: ${{ matrix.dist }}-v2

      - name: Download Spark ${{ matrix.spark }}
        if: steps.spark-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/spark
          # Download to a file with retries (not a pipe) so a truncated transfer
          # fails the step instead of silently extracting a partial archive.
          curl -fSL --retry 3 --retry-delay 5 -o /tmp/spark.tgz \
            "https://archive.apache.org/dist/spark/spark-${{ matrix.spark }}/${{ matrix.dist }}.tgz"
          tar xzf /tmp/spark.tgz -C ~/spark --strip-components=1
          rm -f /tmp/spark.tgz
          # Fail loudly if the extraction is incomplete, so a bad tree is never cached.
          test -x ~/spark/sbin/start-connect-server.sh
          ls ~/spark/jars/ | grep -q .

      - name: Start Spark Connect server
        run: |
          # Do NOT set SPARK_NO_DAEMONIZE: spark-daemon.sh treats any non-empty
          # value as "run in the foreground", which hangs this step forever.
          # Leaving it unset lets the server daemonize so the wait loop runs.
          ~/spark/sbin/start-connect-server.sh \
            ${{ matrix.packages }} \
            --conf spark.log.level=WARN
          # Wait for the gRPC port to accept connections.
          for i in $(seq 1 60); do
            if bash -c "</dev/tcp/localhost/15002" 2>/dev/null; then echo "Spark Connect up"; break; fi
            sleep 2
          done

      - name: Go e2e suite
        env:
          SPARK_CONNECT_URI: sc://localhost:15002
        run: go test -tags e2e -v -timeout 20m ./tests/e2e/...

      - name: Build shared library and install Python package
        env:
          CGO_ENABLED: "1"
        run: |
          go build -tags driverlib -buildmode=c-shared \
            -o python/adbc_driver_spark/libadbc_driver_spark.so ./c
          python -m pip install --upgrade pip
          pip install -r tests/e2e/requirements.txt
          pip install ./python

      - name: Python e2e suite
        env:
          SPARK_CONNECT_URI: sc://localhost:15002
        run: |
          pytest -v tests/e2e/
          # Package-level DBAPI integration tests (honor SPARK_CONNECT_URI;
          # self-skip when unset). Requested by M3 for extra coverage.
          pytest -v python/tests/test_integration.py

      - name: Validate Python ecosystem examples
        # Every runnable example under examples/python/ is executed against the
        # live Spark Connect server so the documented pandas, polars, DuckDB, and
        # pyarrow integrations cannot silently rot. The auth/TLS example needs
        # real credentials, so it is skipped here.
        env:
          SPARK_CONNECT_URI: sc://localhost:15002
        run: |
          pip install polars duckdb "pandas>=2.0"
          rc=0
          for f in examples/python/[0-9]*.py; do
            case "$f" in
              *06_auth_tls.py) echo "skip $f (needs credentials)"; continue ;;
            esac
            echo "::group::run $f"
            if ! python "$f"; then
              echo "::error file=$f::example failed"
              rc=1
            fi
            echo "::endgroup::"
          done
          exit $rc

      - name: Validate C example
        # Compile the C example together with the ADBC driver manager C++
        # sources bundled in the adbc_driver_manager wheel (no system package
        # needed), then run it against the live server. This proves the C/C++
        # support: the shared library loads through the standard driver manager
        # and serves Arrow results.
        if: matrix.cr == 'true'
        env:
          SPARK_REMOTE: sc://localhost:15002
        run: |
          set -euo pipefail
          DM=$(python -c "import adbc_driver_manager, os; print(os.path.dirname(adbc_driver_manager.__file__))")
          cc -c examples/c/quickstart.c -I"$DM/arrow-adbc" -o /tmp/qs.o
          objs=(/tmp/qs.o)
          for f in adbc_driver_manager_api adbc_driver_manager_driver_loading adbc_driver_manager_profiles adbc_driver_manager; do
            c++ -std=c++17 -c "$DM/$f.cc" -I"$DM/arrow-adbc" -I"$DM" -o "/tmp/$f.o"
            objs+=("/tmp/$f.o")
          done
          c++ "${objs[@]}" -ldl -o /tmp/quickstart_c
          SPARK_DRIVER="$PWD/python/adbc_driver_spark/libadbc_driver_spark.so" /tmp/quickstart_c

      - name: Set up R
        if: matrix.cr == 'true'
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Validate R example
        # Run the R example through the adbcdrivermanager package (CRAN), which
        # loads our shared library and reads Arrow results into a data.frame.
        if: matrix.cr == 'true'
        env:
          SPARK_REMOTE: sc://localhost:15002
        run: |
          set -euo pipefail
          Rscript -e 'install.packages("adbcdrivermanager")'
          SPARK_DRIVER="$PWD/python/adbc_driver_spark/libadbc_driver_spark.so" Rscript examples/r/quickstart.R

      - name: Validate Rust example
        # Rust loads the shared library through the adbc_driver_manager crate
        # (which builds the driver manager itself, no system package). cargo is
        # preinstalled on the runner.
        if: matrix.cr == 'true'
        env:
          SPARK_REMOTE: sc://localhost:15002
        run: |
          set -euo pipefail
          SPARK_DRIVER="$PWD/python/adbc_driver_spark/libadbc_driver_spark.so" \
            cargo run --quiet --manifest-path examples/rust/Cargo.toml

      - name: Set up Ruby
        if: matrix.cr == 'true'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Validate Ruby example
        # Red ADBC (the adbc gem) loads the shared library through the ADBC GLib
        # driver manager. rubygems-requirements-system installs the GLib system
        # library automatically.
        if: matrix.cr == 'true'
        env:
          SPARK_REMOTE: sc://localhost:15002
        run: |
          set -euo pipefail
          gem install rubygems-requirements-system
          gem install red-adbc
          SPARK_DRIVER="$PWD/python/adbc_driver_spark/libadbc_driver_spark.so" \
            ruby examples/ruby/quickstart.rb

      - name: Dump Spark logs on failure
        if: failure()
        run: tail -n 300 ~/spark/logs/*.out 2>/dev/null || true
